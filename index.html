<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Omega AI Assistant</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Marked.js for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Highlight.js for syntax highlighting -->
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css"
/>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
</head>
<body>

  <!-- ================= HEADER ================= -->
  <header class="app-header">
    <div class="header-left">
      <button id="sidebarToggle" class="menu-btn">☰</button>

      <div>
        <h1>My chartbot</h1>
        <p>Ask me anything</p>
      </div>
    </div>

    <button id="headerMenuBtn" class="header-menu-btn">⋮</button>
  </header>

  <!-- ================= MAIN APP ================= -->
  <div class="app-container">

    <!-- ========== SIDEBAR ========== -->
    <aside id="sidebar" class="sidebar">

      <div class="sidebar-header">
        <h2>Chats</h2>
        <button id="newChatBtn" class="new-chat-btn">+ New</button>
      </div>

      <div id="chatList" class="chat-list">
        <!-- Chat sessions will appear here -->
      </div>
    </aside>

    <!-- ========== MAIN CHAT AREA ========== -->
    <main class="chat-section">

      <!-- Chat Header -->
      <div class="chat-header">
        <h2 id="chatTitle">Omega AI Assistant</h2>

        <div class="chat-actions">
          <button id="clearBtn" class="action-btn">
            Clear
          </button>

          <button id="logoutBtn" class="logout-btn">
            Logout
          </button>
        </div>
      </div>

      <!-- Chat Messages -->
      <div
        id="chatContainer"
        class="chat-container"
      ></div>

      <!-- Input Area -->
      <div class="input-container">
        <input
          type="text"
          id="userInput"
          placeholder="Type a message..."
          autocomplete="off"
        />

        <button id="sendBtn">Send</button>
      </div>

    </main>
  </div>

  <!-- ================= AUTH MODAL ================= -->
  <div id="authModal" class="modal">
    <div class="modal-content">
      <h2>Welcome</h2>

      <input
        type="email"
        id="email"
        placeholder="Email"
      />

      <input
        type="password"
        id="password"
        placeholder="Password"
      />

      <button id="loginBtn">
        Login
      </button>

      <button id="signupBtn">
        Sign Up
      </button>
    </div>
  </div>

  <!-- ================= SCRIPT ================= -->
  <script src="script.js"></script>

  <!-- ================= SERVICE WORKER ================= -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("service-worker.js")
        .catch(console.error);
    }
  </script>

</body>
    </html>
