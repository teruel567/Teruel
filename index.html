<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistance</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #chatContainer {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: #111;
      display: flex;
      flex-direction: column;
      gap: 15px;
      padding-bottom: 120px;
    }
    
    .message {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.5;
    }
    
    .user {
      align-self: flex-end;
      background: #f97316;
      color: white;
    }
    
    .assistant {
      align-self: flex-start;
      background: #2a2a2a;
      color: white;
    }
    
    img {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 8px;
    }
    
    .input-area {
      padding: 16px;
      background: #1f1f1f;
      border-top: 1px solid #333;
      flex-shrink: 0;
    }
    
    #imagePreview img {
      height: 85px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid #555;
    }
  </style>
</head>
<body>

  <!-- Header with Clear Button -->
  <div style="padding: 16px 20px; background: #1f1f1f; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
    <h2 style="margin: 0; font-size: 18px; font-weight: 600;">Teruel Omega AI</h2>
    <button id="clearBtn" 
            style="padding: 8px 18px; background: #ef4444; color: white; border: none; border-radius: 20px; font-size: 14px; cursor: pointer;">
      Clear Chat
    </button>
  </div>

  <!-- Chat Messages Area -->
  <div id="chatContainer"></div>

  <!-- Message Input Area -->
  <div class="input-area">
    <!-- Image Previews -->
    <div id="imagePreview" 
         style="display: flex; gap: 12px; flex-wrap: wrap; max-height: 110px; overflow-x: auto; padding: 4px 0;">
    </div>

    <!-- Input Row -->
    <div style="display: flex; align-items: center; gap: 10px;">
      <label style="cursor: pointer; font-size: 28px; padding: 10px; border-radius: 50%; transition: all 0.2s; color: #ccc;">
        📎
        <input type="file" id="imageUpload" accept="image/*" multiple style="display: none;">
      </label>

      <input type="text" id="userInput" 
             placeholder="Type a message... or upload an image 📸" 
             style="flex: 1; padding: 14px 20px; background: #2a2a2a; border: 1px solid #444; border-radius: 30px; color: white; font-size: 16px; outline: none;">

      <button id="sendBtn" 
              style="padding: 14px 26px; background: #f97316; color: white; border: none; border-radius: 30px; font-weight: 600; cursor: pointer;">
        Send
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
        </html>
