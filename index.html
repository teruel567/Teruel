<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Omega AI Assistant</title>

  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
</head>

<body>

  <!-- AUTH MODAL -->
  <div id="authModal" class="auth-modal">
    <div class="auth-box">
      <h2>Welcome</h2>

      <input
        type="email"
        id="email"
        placeholder="Email"
      />

      <input
        type="password"
        id="password"
        placeholder="Password"
      />

      <button id="loginBtn">
        Login
      </button>

      <button id="signupBtn">
        Sign Up
      </button>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header">
  <h2>Omega AI Assistant</h2>

  <div class="header-actions">
    <button id="clearBtn">
      Clear
    </button>

    <button id="logoutBtn">
      Logout
    </button>
  </div>
</header>

  <!-- CHAT -->
  <div id="chatContainer"></div>

  <!-- INPUT -->
  <div class="input-area">

    <input
      id="userInput"
      type="text"
      placeholder="Type a message..."
    />

    <button id="sendBtn">
      Send
    </button>

  </div>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- MAIN SCRIPT -->
  <script src="/script.js"></script>

</body>
</html>
