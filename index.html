<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Customer Support Demo</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <header>
  <h2>AI Customer Support</h2>

  <div style="display: flex; gap: 10px;">
    <button id="downloadBtn">Download</button>
    <button id="clearBtn">Clear Chat</button>
  </div>
</header>

  <!-- Quick Questions -->
  <div class="quick-questions">
    <button onclick="quickAsk('Do you offer refund?')">Refund</button>
    <button onclick="quickAsk('How long is delivery?')">Delivery</button>
    <button onclick="quickAsk('What products do you sell?')">Products</button>
  </div>

  <!-- Chat -->
  <div id="chatContainer"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <input type="text" id="userInput" placeholder="Type a message...">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
  </html>
