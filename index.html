<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0a] text-white flex flex-col h-screen overflow-hidden">

  <!-- Header -->
  <div class="p-4 border-b border-gray-800 flex items-center gap-3 bg-[#111]">
    <img src="logo.png" alt="Logo" class="w-10 h-10 rounded-full">
    <div>
      <h1 class="font-semibold text-lg">AI Assistance</h1>
      <p class="text-xs text-gray-400">IA chatbot • Powered by Groq</p>
    </div>
    <div id="message-count" class="ml-auto text-xs text-gray-500">
      Messages sent: 0
    </div>
  </div>

  <!-- Messages Area -->
  <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6 bg-[#0a0a0a]">
    <!-- Welcome added by JS -->
  </div>

  <!-- Input Area -->
  <form id="chat-form" class="p-4 border-t border-gray-800 bg-[#0a0a0a]">
    <div class="flex gap-3">
      <input 
        id="user-input"
        type="text"
        class="flex-1 bg-gray-900 border border-gray-700 focus:border-orange-500 rounded-full px-6 py-4 text-white placeholder-gray-500 focus:outline-none disabled:opacity-60"
        placeholder="Type your message here..."
        autocomplete="off"
      >
      <button 
        type="submit"
        id="send-btn"
        class="bg-orange-600 hover:bg-orange-700 disabled:bg-gray-700 px-8 rounded-full font-medium min-w-[70px]"
      >
        Send
      </button>
    </div>
    <p class="text-center text-[10px] text-gray-500 mt-3">
      Powered by Groq
    </p>
  </form>

  <script src="script.js"></script>
</body>
</html>
